<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACIVERT - Official Website</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Font Awesome for social media icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- Load Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* --- You can adjust this value from 0 (no filter) to 1 (fully black) --- */
            --bg-overlay-opacity: 0.6; 
        }

        body {
            /* Sets the background image */
            font-family: 'Inter', sans-serif;
            background-image: url('BANDPHOTO1.jpeg');
            
            /* Ensures the image covers the whole viewport */
            background-size: cover;
            
            /* Centers the image */
            background-position: center center;
            
            /* This is the magic property: it fixes the background so it doesn't move or resize with page zoom/scroll */
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* This creates the semi-transparent black filter over the background image */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, var(--bg-overlay-opacity));
            
            /* Sits on top of the body background */
            z-index: 1; 
        }

        /* This wrapper holds all the content and sits on top of the overlay */
        .content-wrapper {
            position: relative;
            z-index: 2;
        }

        /* --- Responsive YouTube Embed --- */
        /* This creates a 16:9 aspect ratio container for the video */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio (9 / 16 = 0.5625) */
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem; /* rounded-lg */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); /* shadow-2xl */
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="min-h-screen text-white">

    <!-- This wrapper ensures all content stays above the dark overlay -->
    <div class="content-wrapper flex flex-col min-h-screen">

        <!-- Header Section -->
        <header class="p-4 md:p-8">
            <div class="container mx-auto flex justify-between items-center">
                
                <!-- Left Spacer: This empty div takes up 1/3 of the space to help center the logo -->
                <div class="w-1/3">
                    <!-- Intentionally empty -->
                </div>
                
                <!-- Centered Logo -->
                <div class="w-1/3 flex justify-center">
                    <!-- Logo image. It will scale down on smaller screens while maintaining its aspect ratio. -->
                    <!-- Based on your 600x200px file, I've set a max-width to keep it from being too large. -->
                    <img src="LOGO.png" alt="LACIVERT Logo" class="w-full max-w-xs sm:max-w-sm md:max-w-md lg:max-w-lg" style="height: auto;">
                </div>
                
                <!-- Right Social Icons -->
                <div class="w-1/3 flex justify-end">
                    <div class="flex space-x-3 md:space-x-5 text-white text-3xl md:text-4xl">
                        <!-- Remember to replace the '#' with your actual social media links! -->
                        <a href="#" aria-label="Instagram" class="hover:opacity-75 transition-opacity" target="_blank" rel="noopener noreferrer">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="#" aria-label="Spotify" class="hover:opacity-75 transition-opacity" target="_blank" rel="noopener noreferrer">
                            <i class="fab fa-spotify"></i>
                        </a>
                        <a href="#" aria-label="Apple Music" class="hover:opacity-75 transition-opacity" target="_blank" rel="noopener noreferrer">
                            <i class="fab fa-apple"></i>
                        </a>
                        <a href="#" aria-label="YouTube Music" class="hover:opacity-75 transition-opacity" target="_blank" rel="noopener noreferrer">
                            <i class="fab fa-youtube"></i>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content (Video) -->
        <!-- flex-grow makes this section expand to fill available space, pushing the footer down -->
        <!-- flex items-center justify-center vertically and horizontally centers the video container -->
        <main class="flex-grow flex items-center justify-center p-4">
            
            <!-- Sets a max width for the video so it doesn't get too wide on large desktops -->
            <div class="w-full max-w-2xl">
                
                <!-- Responsive YouTube Embed Container -->
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/CpJZ1CSf7cM" 
                        title="YouTube video player"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                    ></iframe>
                </div>
            </div>
        </main>

        <!-- Footer (empty, but ensures proper page structure) -->
        <footer class="p-4 text-center text-sm text-gray-400">
            <!-- You could add a copyright here, e.g., © 2025 LACIVERT -->
        </footer>
    </div>

</body>
</html>
